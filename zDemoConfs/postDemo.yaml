# 基本参数
method: POST
host: http://localhost:8081
path: /postDemo
header: "h1:v1\th2:$1"

postParamTemplateV2: '{"id":$1, "name":"$2", "otherParam":"abc"}'
# 源文件
srcFilePath: ./zDemoConfs/testData.txt     #数据源文件
# 并发控制
workerCoroutineNum: 10       #并发数，最多有多少个并发同时请求
qpsLimit: 100                #限速，每秒最多多少个请求

builtInParamAppenderName: time
dryRun: false
